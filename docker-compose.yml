services:
  db:
    image: postgres:16-alpine
    container_name: cognitive_trainer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cognitive_trainer
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cognitive_trainer']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
